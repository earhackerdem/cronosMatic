services:
  db:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - cronosmatic

  pgadmin:
    image: dpage/pgadmin4:latest
    restart: unless-stopped
    user: root
    entrypoint: >
      /bin/sh -c "
      echo \"db:5432:$${POSTGRES_DB}:$${POSTGRES_USER}:$${POSTGRES_PASSWORD}\" > /tmp/pgpassfile &&
      chmod 600 /tmp/pgpassfile &&
      chown 5050:5050 /tmp/pgpassfile &&
      echo '{\"Servers\":{\"1\":{\"Name\":\"CronosMatic Dev\",\"Group\":\"Servers\",\"Host\":\"db\",\"Port\":5432,\"MaintenanceDB\":\"'$${POSTGRES_DB}'\",\"Username\":\"'$${POSTGRES_USER}'\",\"SSLMode\":\"prefer\",\"PassFile\":\"/tmp/pgpassfile\"}}}' > /pgadmin4/servers.json &&
      /entrypoint.sh
      "
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@cronosmatic.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_LISTEN_PORT: 5050
      PGPASSFILE: /tmp/pgpassfile
    ports:
      - "${PGADMIN_PORT:-5050}:5050"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      db:
        condition: service_healthy
    networks:
      - cronosmatic

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - cronosmatic

  backend:
    build: ./backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      BACKEND_DEBUG: ${BACKEND_DEBUG}
      BACKEND_SECRET_KEY: ${BACKEND_SECRET_KEY}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS}
      BACKEND_JWT_SECRET_KEY: ${BACKEND_JWT_SECRET_KEY}
      BACKEND_JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${BACKEND_JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      BACKEND_JWT_REFRESH_TOKEN_EXPIRE_DAYS: ${BACKEND_JWT_REFRESH_TOKEN_EXPIRE_DAYS:-7}
      BACKEND_STORAGE_BASE_URL: ${BACKEND_STORAGE_BASE_URL:-}
      BACKEND_DEFAULT_SHIPPING_COST: ${BACKEND_DEFAULT_SHIPPING_COST:-10.00}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cronosmatic

  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT:-4200}:4200"
    depends_on:
      - backend
    networks:
      - cronosmatic

volumes:
  db_data:
  pgadmin_data:
  redis_data:

networks:
  cronosmatic:
    driver: bridge
